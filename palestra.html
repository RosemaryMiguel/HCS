<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Palestra - HCS</title>
  <link rel="stylesheet" href="palestra.css">
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="Imagens/logo/logo.png" alt="HCS Logo">
    <h1>HCS</h1>
  </a>

  <nav>
    <a href="index.html">Início</a>
    <a href="eventos.html">Eventos</a>
    <a href="sobre.html" >Sobre</a>
    <a href="login.html">Admin</a>
  </nav>

</header>

<section class="palestra-container">

  <h1 class="titulo" id="titulo"></h1>
  <h2 class="subtitulo" id="subtitulo"></h2>

  <p class="descricao" id="descricao"></p>

  <div class="conteudo">

    <!-- PERFIL -->
    <div class="perfil">
      <img id="fotoPalestrante">
      <h3 id="nomePalestrante"></h3>
      <p id="instituicao"></p>
    </div>

    <!-- VIDEO -->
    <div class="video" id="videoContainer">
      <iframe width="560" height="315" id="video" allowfullscreen></iframe>

      <div class="acoes">
        <a id="btnAgenda" class="btn agenda" target="_blank">
          <img src="Imagens/logo/iconeGoogleAgenda.png">
          Google Agenda
        </a>

        <a id="btnInscricao" class="btn agenda">
          Inscreva-se
        </a>
      </div>
    </div>

  </div>

</section>

<footer class="footer">
  <div class="footer-container">

    <div class="footer-col">
      <h2>HCS</h2>
      <p>
        Conectando Humanidade, Ciência e Sociedade por meio de palestras acessíveis.
      </p>
    </div>

    <div class="footer-col">
      <h3>Navegação</h3>
      <a href="index.html">Início</a>
      <a href="eventos.html">Eventos</a>
      <a href="sobre.html">Sobre</a>
    </div>

    <div class="footer-col">
      <h3>Contato</h3>
      <p>Email: contato@hcs.com</p>
    </div>

    <div class="footer-col">
      <h3>Redes</h3>
      <a href="https://www.youtube.com/@hcs-uff" target="_blank">YouTube</a>
      <a href="https://www.instagram.com/evento.hcs.uff/" target="_blank">Instagram</a>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 HCS</p>
  </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKER2IZUX8J2kWuPpXDeQdrofgpDf6MpY",
  authDomain: "hcs-site-bca98.firebaseapp.com",
  projectId: "hcs-site-bca98",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// ===== ID =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  alert("ID inválido");
  throw new Error("Sem ID");
}

// ===== BUSCA =====
const docRef = doc(db, "eventos", id);
const docSnap = await getDoc(docRef);

if (!docSnap.exists()) {
  alert("Palestra não encontrada");
  throw new Error("Não encontrada");
}

const data = docSnap.data();

// ===== FUNÇÃO SEGURA =====
const safe = (v, d="Não informado") => v && v.trim() !== "" ? v : d;

// ===== PREENCHER =====
document.getElementById("titulo").innerText = safe(data.titulo);
document.getElementById("subtitulo").innerText = "Com " + safe(data.palestrante);
document.getElementById("descricao").innerText = safe(data.descricao);

document.getElementById("nomePalestrante").innerText = safe(data.palestrante);
document.getElementById("instituicao").innerText = safe(data.instituicao);

document.getElementById("fotoPalestrante").src =
  data.imagem || "Imagens/default.png";

// ===== VIDEO =====
if (data.youtube && data.youtube.trim() !== "") {
  document.getElementById("video").src = data.youtube;
} else {
  document.getElementById("videoContainer").style.display = "none";
}

// ===== AGENDA =====
// ===== AGENDA =====
if (data.data) {
  const start = data.data.toDate();
  const end = new Date(start.getTime() + 60 * 60 * 1000);

  const formatDate = (date) =>
    date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

  const titulo = data.titulo || "Palestra HCS";
  const descricao = data.descricao || "";
  const local = "Online";

  const linkAgenda =
    "https://www.google.com/calendar/render?action=TEMPLATE" +
    "&text=" + encodeURIComponent(titulo) +
    "&dates=" + formatDate(start) + "/" + formatDate(end) +
    "&details=" + encodeURIComponent(descricao) +
    "&location=" + encodeURIComponent(local);

  const btnAgenda = document.getElementById("btnAgenda");

  if (btnAgenda) {
    btnAgenda.href = linkAgenda;
    btnAgenda.target = "_blank";
  }
}

// ===== INSCRIÇÃO =====
const btn = document.getElementById("btnInscricao");

if (btn) {
  const agora = new Date();
  const dataEvento = data.data?.toDate?.();

  // remove comportamento padrão de "#"
  btn.addEventListener("click", (e) => {
    if (!btn.href) e.preventDefault();
  });

  if (!dataEvento) {
    btn.innerText = "Data não definida";
    btn.removeAttribute("href");
    btn.classList.add("desativado");
  }

  else if (dataEvento < agora) {
    btn.innerText = "Evento finalizado";
    btn.removeAttribute("href");
    btn.classList.add("desativado");
  }

  else {
    if (data.inscricaoLink && data.inscricaoLink.trim().startsWith("http")) {
      btn.innerText = "Inscreva-se";
      btn.href = data.inscricaoLink;
      btn.target = "_blank";
    } else {
      btn.innerText = "Inscrições em breve";
      btn.removeAttribute("href");
      btn.classList.add("desativado");
    }
  }
}
</script>

</body>
</html>
